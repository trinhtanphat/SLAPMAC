name: SlapMac-iOS
options:
  bundleIdPrefix: com.slapmac
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  SlapMac:
    type: application
    platform: iOS
    sources:
      - path: SlapMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.slapmac.ios
        MARKETING_VERSION: "1.0.12"
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: SlapMac/Info.plist
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        SWIFT_VERSION: "5.9"
    dependencies:
      - sdk: CoreMotion.framework
      - sdk: AVFoundation.framework
